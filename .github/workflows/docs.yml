name: Documentation
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
            ~/.julia/registries
          key: docs-julia-${{ hashFiles('docs/Project.toml', 'Project.toml') }}
          restore-keys: docs-julia-
      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(RegistrySpec(url="https://github.com/emmt/EmmtRegistry"))
            Pkg.add(url="https://github.com/fabienbaron/OITOOLS.jl.git")
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
